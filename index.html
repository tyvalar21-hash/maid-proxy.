<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Maria Test</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 20px auto;
            padding: 10px;
            background: #1a1a2e;
            color: #eee;
        }
        #chat {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
            background: #16213e;
            border-radius: 5px;
        }
        input {
            width: 75%;
            padding: 8px;
            background: #0f3460;
            color: #eee;
            border: 1px solid #533483;
            border-radius: 3px;
        }
        button {
            padding: 8px 15px;
            background: #533483;
            color: #eee;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>Maria Test</h2>
    <div id="chat"></div>
    <input id="msg" placeholder="Напиши...">
    <button onclick="send()">Send</button>

    <script>
        let history = [];
        const PROXY_URL = "https://deepseek-proxy-7aex.onrender.com/chat";

        function addMsg(role, text) {
            let d = document.createElement("div");
            d.innerHTML = "<b>" + (role === "user" ? "You" : "Maria") + ":</b> " + text;
            document.getElementById("chat").appendChild(d);
        }

        async function send() {
            let input = document.getElementById("msg");
            let msg = input.value.trim();
            if (!msg) return;
            
            addMsg("user", msg);
            input.value = "";

            try {
                let r = await fetch(PROXY_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: msg,
                        history: history.slice(-10),
                        role: "test",
                        playerRole: "admin",
                        playerId: "test",
                        playerName: "Test"
                    })
                });
                
                let data = await r.json();
                addMsg("assistant", data.reply);
                history.push({ role: "user", content: msg });
                history.push({ role: "assistant", content: data.reply });
            } catch (e) {
                addMsg("assistant", "Error: " + e.message);
            }
        }
    </script>
</body>
</html>
