<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Maria Test</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 20px auto; padding: 10px; }
        #chat { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        input { width: 80%; padding: 8px; }
        button { padding: 8px 15px; }
    </style>
</head>
<body>
    <h2>Maria Memory Test</h2>
    <div id="chat"></div>
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">Send</button>

    <script>
        let history = [];
        
        function addMsg(role, text) {
            let div = document.createElement("div");
            div.innerHTML = "<b>" + (role === "user" ? "You" : "Maria") + ":</b> " + text;
            document.getElementById("chat").appendChild(div);
        }
        
        async function send() {
            let input = document.getElementById("msg");
            let msg = input.value.trim();
            if (!msg) return;
            
            addMsg("user", msg);
            input.value = "";
            
            try {
                let response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: msg,
                        history: history.slice(-10),
                        role: "You are Maria, a devoted maid. Reply in SAME language. Be short.",
                        playerRole: "admin",
                        playerId: "test123",
                        playerName: "TestUser"
                    })
                });
                
                let data = await response.json();
                addMsg("assistant", data.reply);
                
                history.push({ role: "user", content: msg });
                history.push({ role: "assistant", content: data.reply });
            } catch (e) {
                addMsg("assistant", "Error: " + e.message);
            }
        }
    </script>
</body>
</html>
